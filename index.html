<!DOCTYPE html>
<html>
<head>
    <title>The Sunset | Your Perfect Getaway</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">

    <h1 class="logo">The Sunset</h1>


        <ul class="nav-links">
            
            <li><a href="index.html">Home</a></li>

            <li><a href="about.html">About</a></li>

            <li><a href="rooms.html">Rooms</a></li>

            <li><a href="contact.html">Contact</a></li>
        </ul>

    </nav>

    <!-- Hero Section -->
    <section class="hero">


        <p>Where Every Stay Ends Beautifully</p>

    </section>

    <!-- Booking Form Section -->
<section class="booking-section">

    <h2>Book Your Stay</h2>

    <form id="bookingForm">

        <!-- Check In -->
        <input 
            type="date" 
            id="checkin"
            required
        >

        <!-- Check Out -->
        <input 
            type="date" 
            id="checkout"
            required
        >

        <!-- Guests -->
       <div class="guest-counter">

    <label>Guests</label>

    <div class="counter-box">

        <!-- Minus Button -->
        <button type="button" id="minusBtn">
            -
        </button>

        <!-- Guest Number -->
        <span id="guestCount">
            1
        </span>

        <!-- Plus Button -->
        <button type="button" id="plusBtn">
            +
        </button>

    </div>

</div>

        <!-- Room Type -->
        <select id="room" required>

            <option value="">Room Type</option>

            <option value="Studio">
                Studio
            </option>

            <option value="One bedroom">
                One Bedroom
            </option>

            <option value="Two Bedroom">
                Two Bedroom
            </option>

        </select>

        <!-- Submit Button -->
        <button type="submit">
            Check Availability
        </button>

    </form>

    <!-- Popup Message -->
<div id="popup" class="popup">

    <p id="popup-message"></p>

</div>

</section>

    <!-- About Section -->
    <section id="about" class="about">

        <p>
            Welcome to The Sunset — your ideal escape for comfort,
            style, and peaceful evenings. Whether you're here to relax,
            recharge, or create memories, every moment is designed to feel special.
        </p>

    </section>

<script src="script.js"></script>

</body>
</html>
